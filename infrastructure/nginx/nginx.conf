user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging estruturado (JSON) ────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_addr":"$upstream_addr",'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"request_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ───────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # ── Segurança: ocultar versão do Nginx ───────────────
    server_tokens off;

    # ── Rate Limiting ─────────────────────────────────────
    # Geral: 300 req/15min = 0.33 req/s, burst de 20
    limit_req_zone $binary_remote_addr zone=general:10m rate=20r/m;
    # Auth endpoints: mais restritivo
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    # WebSocket: conexões por IP
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    # ── Gzip ──────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ── Upstream Services ─────────────────────────────────
    upstream backend_api {
        server backend:4000;
        keepalive 32;
    }

    upstream frontend_app {
        server frontend:3000;
        keepalive 16;
    }

    # ── Servidor HTTP → redireciona para HTTPS ────────────
    server {
        listen 80;
        server_name _;

        # Health check do nginx (para docker healthcheck)
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Redireciona tudo para HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Servidor HTTPS Principal ──────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS (certificados montados via volume)
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS: força HTTPS por 1 ano
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Security Headers ──────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # CSP: ajustar domínios conforme necessário
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https://api.binance.com; font-src 'self' data:; frame-ancestors 'none';" always;

        # ID único por request (útil para correlação de logs)
        add_header X-Request-ID $request_id always;

        # ── Auth Endpoints (rate limit restritivo) ────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_http_version 1.1;
            proxy_read_timeout 30s;
        }

        # ── API REST ──────────────────────────────────────
        location /api/ {
            limit_req zone=general burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_http_version 1.1;
            proxy_read_timeout 60s;
        }

        # ── WebSocket ─────────────────────────────────────
        # CORRIGIDO [SEC-2]: JWT NÃO vai na URL aqui
        # O cliente deve enviar via header no handshake HTTP:
        #   Sec-WebSocket-Protocol: bearer.<token>
        # ou via cookie HttpOnly na mesma origem
        location /ws {
            limit_conn ws_conn 5;  # max 5 conexões WS por IP

            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;  # 1h para WS longas
            proxy_send_timeout 3600s;
        }

        # ── Health Check Backend ──────────────────────────
        location /health {
            access_log off;
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
        }

        # ── Frontend Next.js ──────────────────────────────
        location / {
            limit_req zone=general burst=30 nodelay;

            proxy_pass http://frontend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";  # HTTP/2 keepalive
            proxy_read_timeout 60s;

            # Cache de assets estáticos do Next.js
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
                proxy_pass http://frontend_app;
                proxy_cache_valid 200 7d;
                add_header Cache-Control "public, max-age=604800, immutable";
            }
        }
    }
}
