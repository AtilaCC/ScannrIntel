version: '3.9'

services:
  # ── Databases ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: crypto_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: crypto_user
      POSTGRES_PASSWORD: crypto_pass
      POSTGRES_DB: crypto_intelligence
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U crypto_user -d crypto_intelligence']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crypto_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis_pass
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'redis_pass', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crypto_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://crypto_user:crypto_pass@postgres:5432/crypto_intelligence
      REDIS_URL: redis://:redis_pass@redis:6379
      CORS_ORIGIN: http://localhost:3000
      BCRYPT_ROUNDS: 12
    ports:
      - '4000:4000'
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:4000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Scanner Service ────────────────────────────────────────
  scanner:
    build:
      context: ./scanner-service
      dockerfile: Dockerfile
    container_name: crypto_scanner
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      REDIS_URL: redis://:redis_pass@redis:6379
      SCAN_SYMBOLS: BTCUSDT,ETHUSDT,BNBUSDT,SOLUSDT,XRPUSDT,ADAUSDT,AVAXUSDT,DOTUSDT,LINKUSDT,UNIUSDT,ATOMUSDT,LTCUSDT,ETCUSDT,XLMUSDT,TRXUSDT,NEARUSDT,DOGEUSDT,APTUSDT,ARBUSDT,OPUSDT

  # ── AI Service ─────────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: crypto_ai
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://crypto_user:crypto_pass@postgres:5432/crypto_intelligence
      REDIS_URL: redis://:redis_pass@redis:6379

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NEXT_PUBLIC_WS_URL: ws://localhost:4000/ws
    container_name: crypto_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: ws://localhost:4000/ws
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: crypto_network
